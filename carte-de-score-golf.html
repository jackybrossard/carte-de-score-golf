  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  .badge-eagle { background: var(--amber-100); color: var(--amber-800); }
  .badge-birdie { background: var(--emerald-50); color: var(--emerald-700); }
  .badge-par { background: var(--stone-100); color: var(--stone-600); }

<body>
<div id="app" class="wrap"></div>

<script>
(function () {
  "use strict";

  var COURSES_KEY = "golfScorecardCourses";
  var HISTORY_KEY = "golfScorecardHistory";
  var DEFAULT_PAR = 4, MIN_PAR = 3, MAX_PAR = 5, MAX_PLAYERS = 6, HALF = 9;
  var timerInterval = null;

  function sum(a, b) { return a + b; }
  function sumRange(arr, start, end) {
    var total = 0;
    for (var i = start; i < end; i++) total += (arr[i] || 0);
    return total;
  }
  function formatTime(totalSeconds) {
    var m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }
  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function badgeClass(diff) {
    if (diff <= -2) return "badge-eagle";
    if (diff === -1) return "badge-birdie";
    if (diff === 0) return "badge-par";
    if (diff === 1) return "badge-bogey";
    return "badge-double";
  }
  function diffLabel(diff) { return diff > 0 ? "+" + diff : String(diff); }
  function formatDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) +
        " " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    } catch (e) { return iso; }
  }

  // ---------- persistence ----------
  function loadCourses() {
    try { return JSON.parse(localStorage.getItem(COURSES_KEY) || "[]"); }
    catch (e) { return []; }
  }
  function persistCourses(list) {
    try { localStorage.setItem(COURSES_KEY, JSON.stringify(list)); }
    catch (e) { console.error("Erreur de sauvegarde des parcours :", e); }
  }
  function loadHistoryList() {
    try {
      var list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      list.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
      return list;
    } catch (e) { return []; }
  }

  function defaultState() {
    return {
      screen: "config",
      courses: loadCourses(),
      selectedCourseId: null,
      courseName: "",
      numHoles: 18,
      pars: Array(18).fill(DEFAULT_PAR),
      players: ["", ""],
      scores: [],
      roundInitialized: false,
      finishedRound: false,
      running: false,
      currentHole: 0,
      holeStart: null,
      holeTimes: [],
      elapsed: 0,
      playSubview: "hole",
      copied: false,
      savedNotice: false,
      courseSavedNotice: false,
      history: []
    };
  }
  var state = defaultState();

  // ---------- course management ----------
  function selectCourse(id) {
    var c = state.courses.find(function (x) { return x.id === id; });
    if (!c) return;
    state.selectedCourseId = c.id;
    state.courseName = c.name;
    state.numHoles = c.numHoles;
    state.pars = c.pars.slice();
    state.courseSavedNotice = false;
    render();
  }
  function newCourseDraft() {
    state.selectedCourseId = null;
    state.courseName = "";
    state.numHoles = 18;
    state.pars = Array(18).fill(DEFAULT_PAR);
    state.courseSavedNotice = false;
    render();
  }
  function persistCurrentCourse() {
    var name = state.courseName.trim() || "Parcours sans nom";
    state.courseName = name;
    var course = {
      id: state.selectedCourseId || ("course_" + Date.now()),
      name: name,
      numHoles: state.numHoles,
      pars: state.pars.slice()
    };
    var idx = state.courses.findIndex(function (c) { return c.id === course.id; });
    if (idx >= 0) state.courses[idx] = course; else state.courses.push(course);
    persistCourses(state.courses);
    state.selectedCourseId = course.id;
  }
  function saveCurrentCourse() {
    persistCurrentCourse();
    state.courseSavedNotice = true;
    render();
    setTimeout(function () { state.courseSavedNotice = false; render(); }, 2200);
  }
  function deleteCourse(id) {
    state.courses = state.courses.filter(function (c) { return c.id !== id; });
    persistCourses(state.courses);
    if (state.selectedCourseId === id) newCourseDraft(); else render();
  }
  function setHoleCount(n) {
    state.numHoles = n;
    var next = Array(n).fill(DEFAULT_PAR);
    for (var i = 0; i < Math.min(n, state.pars.length); i++) next[i] = state.pars[i];
    state.pars = next;
    render();
  }
  function updatePar(i, delta) {
    state.pars[i] = Math.min(MAX_PAR, Math.max(MIN_PAR, state.pars[i] + delta));
    render();
  }

  // ---------- players ----------
  function addPlayer() { if (state.players.length < MAX_PLAYERS) { state.players.push(""); render(); } }
  function removePlayer(i) { if (state.players.length > 1) { state.players.splice(i, 1); render(); } }

  // ---------- round flow ----------
  function goToPlayScreen() {
    persistCurrentCourse();
    state.players = state.players.map(function (p, i) { return p.trim() || ("Joueur " + (i + 1)); });
    state.scores = state.players.map(function () { return state.pars.slice(); });
    state.running = false;
    state.currentHole = 0;
    state.holeStart = null;
    state.holeTimes = Array(state.numHoles).fill(null);
    state.elapsed = 0;
    state.playSubview = "hole";
    state.roundInitialized = true;
    state.finishedRound = false;
    state.screen = "play";
    render();
  }
  function startChrono() {
    state.running = true;
    state.currentHole = 0;
    state.holeStart = Date.now();
    state.playSubview = "hole";
    render();
  }
  function adjustScore(playerIdx, delta) {
    state.scores[playerIdx][state.currentHole] = Math.max(1, state.scores[playerIdx][state.currentHole] + delta);
    render();
  }
  function goToHole(idx) {
    if (idx < 0 || idx >= state.numHoles) return;
    var elapsedHole = Math.floor((Date.now() - state.holeStart) / 1000);
    state.holeTimes[state.currentHole] = elapsedHole;
    state.currentHole = idx;
    state.holeStart = Date.now();
    render();
  }
  function editScore(playerIdx, holeIdx) {
    var current = state.scores[playerIdx][holeIdx];
    var name = state.players[playerIdx];
    var par = state.pars[holeIdx];
    var val = window.prompt("Score de " + name + " au trou " + (holeIdx + 1) + " (par " + par + ") :", String(current));
    if (val === null) return;
    var num = parseInt(val, 10);
    if (!isNaN(num) && num >= 1 && num <= 15) {
      state.scores[playerIdx][holeIdx] = num;
      render();
    } else {
      window.alert("Merci d'entrer un score valide (entre 1 et 15).");
    }
  }
  function totalsThroughCurrentHole() {
    return state.players.map(function (name, pIdx) {
      var strokes = 0, par = 0;
      for (var h = 0; h <= state.currentHole; h++) { strokes += state.scores[pIdx][h]; par += state.pars[h]; }
      return { name: name, strokes: strokes, diff: strokes - par };
    });
  }
  function computeBreakdown() {
    return computeBreakdownFrom(state.pars, state.scores, state.players, state.numHoles);
  }
  function rankedPlayers(players) {
    return players.slice().sort(function (a, b) { return a.totalScore - b.totalScore; });
  }
  function cumulativeSeconds() {
    var finalized = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0);
    var live = state.running && state.holeStart ? Math.floor((Date.now() - state.holeStart) / 1000) : 0;
    return finalized + live;
  }
  function finishRound() {
    var elapsedHole = state.holeStart ? Math.floor((Date.now() - state.holeStart) / 1000) : 0;
    state.holeTimes[state.currentHole] = elapsedHole;
    state.running = false;
    var totalTime = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0);
    state.elapsed = totalTime;
    var b = computeBreakdown();
    saveRoundToHistory(b, totalTime);
    state.finishedRound = true;
    state.screen = "summary";
    render();
  }
  function newGame() {
    state.scores = [];
    state.roundInitialized = false;
    state.finishedRound = false;
    state.running = false;
    state.currentHole = 0;
    state.holeStart = null;
    state.holeTimes = [];
    state.elapsed = 0;
    state.playSubview = "hole";
    state.copied = false;
    state.savedNotice = false;
    state.screen = "config";
    render();
  }

  // ---------- history ----------
  function saveRoundToHistory(breakdown, totalTime) {
    try {
      var round = {
        id: "round_" + Date.now(),
        date: new Date().toISOString(),
        courseName: state.courseName || "Parcours sans nom",
        numHoles: state.numHoles,
        pars: state.pars.slice(),
        players: state.players.slice(),
        scores: state.scores.map(function (r) { return r.slice(); }),
        holeTimes: state.holeTimes.slice(),
        totalTime: totalTime,
        parTotals: { aller: breakdown.allerParTotal, retour: breakdown.retourParTotal, total: breakdown.grandParTotal },
        playerTotals: breakdown.players
      };
      var existing = loadHistoryList();
      existing.push(round);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(existing));
      state.savedNotice = true;
    } catch (e) {
      console.error("Erreur de sauvegarde de la partie :", e);
      state.savedNotice = false;
    }
  }
  function openHistory() {
    state.history = loadHistoryList();
    state.screen = "history";
    render();
  }
  function deleteHistoryItem(id) {
    try {
      var existing = loadHistoryList().filter(function (r) { return r.id !== id; });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(existing));
      state.history = existing;
      render();
    } catch (e) { console.error("Erreur de suppression :", e); }
  }

  function computeBreakdownFrom(pars, scores, players, numHoles) {
    var hasRetour = numHoles > HALF;
    var allerPars = pars.slice(0, Math.min(HALF, numHoles));
    var retourPars = hasRetour ? pars.slice(HALF) : [];
    var allerParTotal = allerPars.reduce(sum, 0);
    var retourParTotal = retourPars.reduce(sum, 0);
    var grandParTotal = allerParTotal + retourParTotal;
    var playersOut = players.map(function (name, pIdx) {
      var arr = scores[pIdx] || [];
      var allerArr = arr.slice(0, Math.min(HALF, numHoles));
      var retourArr = hasRetour ? arr.slice(HALF) : [];
      var allerScore = allerArr.reduce(sum, 0);
      var retourScore = retourArr.reduce(sum, 0);
      var totalScore = allerScore + retourScore;
      return {
        name: name,
        allerScore: allerScore, retourScore: retourScore, totalScore: totalScore,
        allerDiff: allerScore - allerParTotal,
        retourDiff: hasRetour ? (retourScore - retourParTotal) : null,
        totalDiff: totalScore - grandParTotal
      };
    });
    return { hasRetour: hasRetour, allerParTotal: allerParTotal, retourParTotal: retourParTotal, grandParTotal: grandParTotal, players: playersOut };
  }

  // ---------- share ----------
  function buildRecapText(courseName, numHoles, pars, scores, players, holeTimesArr, totalTime, dateStr) {
    var b = computeBreakdownFrom(pars, scores, players, numHoles);
    holeTimesArr = holeTimesArr || [];
    var allerTime = sumRange(holeTimesArr, 0, Math.min(HALF, numHoles));
    var retourTime = b.hasRetour ? sumRange(holeTimesArr, HALF, numHoles) : 0;
    var ranked = b.players.slice().sort(function (a, b2) { return a.totalScore - b2.totalScore; });
    var lines = ["\u26F3 " + (courseName || "R\u00e9sultats") + " \u2014 " + numHoles + " trous" + (dateStr ? " (" + dateStr + ")" : "")];
    lines.push("");
    lines.push("Classement :");
    ranked.forEach(function (r, i) {
      lines.push((i + 1) + ". " + r.name + " : " + r.totalScore + " (" + diffLabel(r.totalDiff) + ")" +
        (b.hasRetour ? "  [Aller " + r.allerScore + " (" + diffLabel(r.allerDiff) + ") \u00b7 Retour " + r.retourScore + " (" + diffLabel(r.retourDiff) + ")]" : ""));
    });
    lines.push("");
    lines.push("D\u00e9tail par trou :");
    function holeLine(h) {
      var par = pars[h];
      var parts = players.map(function (name, pIdx) {
        var val = (scores[pIdx] || [])[h];
        return name + " " + val + " (" + diffLabel(val - par) + ")";
      });
      return "Trou " + (h + 1) + " (par " + par + ") \u2014 " + parts.join(", ");
    }
    lines.push("Aller (1-9) :");
    for (var h = 0; h < Math.min(HALF, numHoles); h++) lines.push(holeLine(h));
    lines.push("Total aller : " + b.allerParTotal + " (par) \u00b7 " + formatTime(allerTime));
    if (b.hasRetour) {
      lines.push("");
      lines.push("Retour (10-18) :");
      for (var h2 = HALF; h2 < numHoles; h2++) lines.push(holeLine(h2));
      lines.push("Total retour : " + b.retourParTotal + " (par) \u00b7 " + formatTime(retourTime));
    }
    lines.push("");
    lines.push("Temps total : " + formatTime(totalTime));
    return lines.join("\n");
  }
  function shareText(text) {
    if (navigator.share) {
      navigator.share({ title: "R\u00e9sultats de golf", text: text }).catch(function () {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        state.copied = true; render();
        setTimeout(function () { state.copied = false; render(); }, 2500);
      }).catch(function () { window.prompt("Copie manuelle (Cmd/Ctrl+C) :", text); });
    } else {
      window.prompt("Copie manuelle (Cmd/Ctrl+C) :", text);
    }
  }
  function shareResults() {
    var text = buildRecapText(state.courseName, state.numHoles, state.pars, state.scores, state.players, state.holeTimes, state.elapsed, null);
    shareText(text);
  }
  function shareHistoryItem(id) {
    var item = state.history.find(function (r) { return r.id === id; });
    if (!item) return;
    var text = buildRecapText(item.courseName, item.numHoles, item.pars, item.scores, item.players, item.holeTimes || [], item.totalTime, formatDate(item.date));
    shareText(text);
  }

  // ---------- timer ----------
  function startTimerTick() {
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }
  function updateTimerDisplay() {
    if (!state.running || !state.holeStart) return;
    var holeElapsed = Math.floor((Date.now() - state.holeStart) / 1000);
    var cumul = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0) + holeElapsed;
    var elHole = document.getElementById("holeTimerDisplay");
    if (elHole) elHole.textContent = formatTime(holeElapsed);
    var elCumul = document.getElementById("cumulTimerDisplay");
    if (elCumul) elCumul.textContent = formatTime(cumul);
    var elCumul2 = document.getElementById("cumulTimerDisplay2");
    if (elCumul2) elCumul2.textContent = formatTime(cumul);
  }

  // ---------- render ----------
  function render() {
    var app = document.getElementById("app");
    clearInterval(timerInterval);
    if (state.screen === "config") app.innerHTML = renderConfig();
    else if (state.screen === "play") { app.innerHTML = renderPlay(); if (state.running) startTimerTick(); }
    else if (state.screen === "history") app.innerHTML = renderHistory();
    else app.innerHTML = renderSummary();
  }

  function renderTabs(active) {
    return '<div class="tabbar">' +
      '<button class="tab-btn ' + (active === "config" ? "active" : "") + '" data-action="go-config">Configuration partie</button>' +
      '<button class="tab-btn ' + (active === "play" ? "active" : "") + '" data-action="go-play" ' + (!state.roundInitialized ? "disabled" : "") + '>Partie</button>' +
      '</div>';
  }

  function renderConfig() {
    if (state.roundInitialized) {
      return renderTabs("config") +
        '<div class="row between" style="margin-bottom:1px;"><div class="row gap2"><span style="font-size:24px;">\u26F3</span><h1>Configuration partie</h1></div>' +
        '<button class="icon-btn" data-action="open-history" aria-label="Historique">\u{1F551}</button></div>' +
        '<p class="sub">Param\u00e8tres verrouill\u00e9s pendant la partie en cours</p>' +
        '<div class="locked-banner">\u{1F512} Une partie est en cours sur <strong>' + escapeHtml(state.courseName || "ce parcours") + '</strong>. Termine-la ou lance une nouvelle partie pour changer la configuration.</div>' +
        '<div class="card">' +
        '<div class="readonly-row"><span>Parcours</span><strong>' + escapeHtml(state.courseName || "\u2014") + '</strong></div>' +
        '<div class="readonly-row"><span>Trous</span><strong>' + state.numHoles + '</strong></div>' +
        '<div class="readonly-row" style="border-bottom:none;"><span>Joueurs</span><strong>' + state.players.map(escapeHtml).join(", ") + '</strong></div>' +
        '</div>' +
        '<button class="btn-primary" data-action="new-game">\u21BA Nouvelle partie</button>';
    }

    var coursesHtml = state.courses.map(function (c) {
      var sel = state.selectedCourseId === c.id;
      return '<div class="course-chip ' + (sel ? "selected" : "") + '" data-action="select-course" data-id="' + c.id + '">' +
        '<span>' + escapeHtml(c.name) + ' \u00b7 ' + c.numHoles + 't</span>' +
        '<span class="chip-del" data-action="delete-course" data-id="' + c.id + '">\u2715</span>' +
        '</div>';
    }).join("");
    coursesHtml += '<div class="course-chip new-chip" data-action="new-course-draft">+ Nouveau</div>';

    var allerCells = state.pars.slice(0, Math.min(HALF, state.numHoles)).map(function (par, i) {
      return parCellHtml(par, i);
    }).join("");
    var allerTotal = state.pars.slice(0, Math.min(HALF, state.numHoles)).reduce(sum, 0);
    var hasRetour = state.numHoles > HALF;
    var retourHtml = "";
    if (hasRetour) {
      var retourCells = state.pars.slice(HALF).map(function (par, i) {
        return parCellHtml(par, HALF + i);
      }).join("");
      var retourTotal = state.pars.slice(HALF).reduce(sum, 0);
      retourHtml = '<div class="half-label">Retour (trous 10-18)</div><div class="par-grid">' + retourCells + '</div>' +
        '<div class="half-total-row"><span>Total retour</span><strong>' + retourTotal + '</strong></div>';
    }
    var grandTotal = state.pars.reduce(sum, 0);

    var playersHtml = state.players.map(function (p, i) {
      return '<div class="player-row">' +
        '<input type="text" class="player-input" data-player-index="' + i + '" value="' + escapeHtml(p) + '" placeholder="Joueur ' + (i + 1) + '">' +
        (state.players.length > 1 ? '<button class="icon-btn" data-action="remove-player" data-index="' + i + '" aria-label="Retirer">\u2715</button>' : '') +
        '</div>';
    }).join("");

    return '' +
      renderTabs("config") +
      '<div class="row between" style="margin-bottom:1px;">' +
      '<div class="row gap2"><span style="font-size:24px;">\u26F3</span><h1>Configuration partie</h1></div>' +
      '<button class="icon-btn" data-action="open-history" aria-label="Historique">\u{1F551}</button>' +
      '</div>' +
      '<p class="sub">Choisis ou cr\u00e9e un parcours, puis tes joueurs</p>' +
      '<div class="card">' +
      '<h2>Parcours</h2>' +
      '<div class="course-row">' + coursesHtml + '</div>' +
      '<input type="text" class="course-name-input" value="' + escapeHtml(state.courseName) + '" placeholder="Nom du parcours" style="width:100%;margin-bottom:12px;border:1px solid var(--stone-300);border-radius:10px;padding:10px 12px;font-size:15px;">' +
      '<div class="holes-toggle" style="margin-bottom:14px;">' +
      [9, 18].map(function (n) {
        return '<button class="toggle-btn ' + (state.numHoles === n ? "active" : "") + '" data-action="set-holes" data-holes="' + n + '">' + n + ' trous</button>';
      }).join("") +
      '</div>' +
      '<div class="half-label" style="margin-top:0;">Aller (trous 1-9)</div>' +
      '<div class="par-grid">' + allerCells + '</div>' +
      '<div class="half-total-row"><span>Total aller</span><strong>' + allerTotal + '</strong></div>' +
      retourHtml +
      '<div class="grand-total-row"><span>Total parcours</span><span>' + grandTotal + '</span></div>' +
      '<button class="link-btn" data-action="save-course" style="margin-top:12px;">\u{1F4BE} Enregistrer le parcours</button>' +
      (state.courseSavedNotice ? '<p class="saved-notice">\u2713 Parcours enregistr\u00e9</p>' : '') +
      '</div>' +
      '<div class="card">' +
      '<h2>\u{1F465} Joueurs</h2>' + playersHtml +
      (state.players.length < MAX_PLAYERS ? '<button class="link-btn" data-action="add-player">+ Ajouter un joueur</button>' : '') +
      '</div>' +
      '<button class="btn-primary" data-action="go-to-play">Continuer vers la partie \u203A</button>';
  }

  function parCellHtml(par, i) {
    return '<div class="par-cell">' +
      '<span class="lbl">Trou ' + (i + 1) + '</span>' +
      '<span class="val">' + par + '</span>' +
      '<div class="par-btns">' +
      '<button class="mini-btn" data-action="update-par" data-index="' + i + '" data-delta="-1">\u2212</button>' +
      '<button class="mini-btn" data-action="update-par" data-index="' + i + '" data-delta="1">+</button>' +
      '</div></div>';
  }

  function scoreTableHtml(editable) {
    var b = computeBreakdown();
    var headerCells = '<th class="name-col">Trou</th><th>Par</th>' + state.players.map(function (n) {
      return "<th>" + escapeHtml(n) + "</th>";
    }).join("");

    function holeRow(h) {
      var t = state.holeTimes[h];
      var cells = state.pars[h] !== undefined ? '<td class="hole-col">' + (h + 1) +
        (t != null ? '<div class="hole-time">' + formatTime(t) + '</div>' : '') +
        '</td><td>' + state.pars[h] + '</td>' : '';
      var scoreCells = state.players.map(function (name, pIdx) {
        var val = (state.scores[pIdx] || [])[h];
        var diff = val - state.pars[h];
        var attrs = editable ? ' data-action="edit-score" data-player="' + pIdx + '" data-hole="' + h + '"' : '';
        return '<td class="' + (editable ? "score-cell" : "") + '"' + attrs + '><span class="score-chip ' + badgeClass(diff) + '">' + val + '</span></td>';
      }).join("");
      return "<tr>" + cells + scoreCells + "</tr>";
    }

    var allerTime = sumRange(state.holeTimes, 0, Math.min(HALF, state.numHoles));
    var retourTime = b.hasRetour ? sumRange(state.holeTimes, HALF, state.numHoles) : 0;

    var allerRows = "";
    for (var h = 0; h < Math.min(HALF, state.numHoles); h++) allerRows += holeRow(h);
    var allerSubtotal = '<tr class="subtotal-row"><td colspan="2">Total aller<div class="hole-time" style="margin-top:3px;">\u23F1 ' + formatTime(allerTime) + '</div></td>' +
      b.players.map(function (p) { return "<td>" + p.allerScore + '<div class="diff-chip">(' + diffLabel(p.allerDiff) + ")</div></td>"; }).join("") + "</tr>";

    var retourRows = "", retourSubtotal = "";
    if (b.hasRetour) {
      for (var h2 = HALF; h2 < state.numHoles; h2++) retourRows += holeRow(h2);
      retourSubtotal = '<tr class="subtotal-row"><td colspan="2">Total retour<div class="hole-time" style="margin-top:3px;">\u23F1 ' + formatTime(retourTime) + '</div></td>' +
        b.players.map(function (p) { return "<td>" + p.retourScore + '<div class="diff-chip">(' + diffLabel(p.retourDiff) + ")</div></td>"; }).join("") + "</tr>";
    }

    var grandRow = '<tr class="grandtotal-row"><td colspan="2">Total parcours<div class="hole-time" style="margin-top:3px;color:#a7f3d0;">\u23F1 ' + formatTime(allerTime + retourTime) + '</div></td>' +
      b.players.map(function (p) { return "<td>" + p.totalScore + '<div class="diff-chip">(' + diffLabel(p.totalDiff) + ")</div></td>"; }).join("") + "</tr>";

    return '<div class="table-scroll"><table class="score-table"><thead><tr>' + headerCells + '</tr></thead><tbody>' +
      '<tr class="section-row"><td colspan="' + (2 + state.players.length) + '">Aller (1-9)</td></tr>' +
      allerRows + allerSubtotal +
      (b.hasRetour ? '<tr class="section-row"><td colspan="' + (2 + state.players.length) + '">Retour (10-18)</td></tr>' + retourRows + retourSubtotal : '') +
      grandRow +
      '</tbody></table></div>';
  }

  function renderPlay() {
    var header = '<h1>Carte de score</h1><p class="sub" style="margin-bottom:16px;">' + escapeHtml(state.courseName || "Parcours sans nom") + '</p>';

    if (!state.running) {
      return renderTabs("play") + header +
        '<div class="chrono-panel">' +
        '<div class="chrono-label">Chrono pr\u00eat</div>' +
        '<div class="chrono-big">00:00</div>' +
        '<button class="btn-primary" style="margin-top:14px;" data-action="start-chrono">\u25B6 D\u00e9marrer</button>' +
        '</div>';
    }

    var subnav = '<div class="tabbar">' +
      '<button class="tab-btn ' + (state.playSubview === "hole" ? "active" : "") + '" data-action="show-hole-view">Trou en cours</button>' +
      '<button class="tab-btn ' + (state.playSubview === "table" ? "active" : "") + '" data-action="show-table-view">Carte de score</button>' +
      '</div>';

    if (state.playSubview === "table") {
      return renderTabs("play") + header + subnav + scoreTableHtml(true) +
        '<div class="total-time-row" style="margin-top:16px;"><span>\u23F1 Temps cumul\u00e9</span><span id="cumulTimerDisplay2" style="font-family:monospace;font-weight:700;">' + formatTime(cumulativeSeconds()) + '</span></div>' +
        '<button class="link-btn" data-action="show-hole-view">\u2039 Retour au trou en cours</button>' +
        '<button class="btn-primary" data-action="finish-round">Terminer la partie \u203A</button>';
    }

    var totals = totalsThroughCurrentHole();
    var ranked = rankedPlayers(totals.map(function (t) { return { name: t.name, totalScore: t.strokes, totalDiff: t.diff }; }));
    var isLast = state.currentHole === state.numHoles - 1;

    var playersHtml = state.players.map(function (name, pIdx) {
      var val = state.scores[pIdx][state.currentHole];
      var diff = val - state.pars[state.currentHole];
      return '<div class="player-score-card">' +
        '<div><div class="name">' + escapeHtml(name) + '</div>' +
        '<div class="badge ' + badgeClass(diff) + '">' + (diff === 0 ? "par" : diffLabel(diff)) + '</div></div>' +
        '<div class="stepper">' +
        '<button class="step-btn step-minus" data-action="adjust-score" data-player="' + pIdx + '" data-delta="-1">\u2212</button>' +
        '<span class="score-val">' + val + '</span>' +
        '<button class="step-btn step-plus" data-action="adjust-score" data-player="' + pIdx + '" data-delta="1">+</button>' +
        '</div></div>';
    }).join("");

    var rankHtml = ranked.map(function (r, i) {
      return '<div class="row between" style="margin-bottom:6px;font-size:14px;">' +
        '<span class="row"><span class="rank-num ' + (i === 0 ? "first" : "") + '">' + (i + 1) + '</span>' +
        '<span class="rank-name">' + escapeHtml(r.name) + '</span></span>' +
        '<span class="rank-score">' + r.totalScore + ' coups <span style="color:var(--stone-400);font-weight:400;">(' + diffLabel(r.totalDiff) + ')</span></span></div>';
    }).join("");

    return renderTabs("play") + header + subnav +
      '<div class="header-bar">' +
      '<div class="row between">' +
      '<div class="row gap2">' +
      '<button class="hole-nav-btn" data-action="prev-hole" ' + (state.currentHole === 0 ? "disabled" : "") + '>\u2039</button>' +
      '<div><div class="hb-label">Trou</div><div class="hb-value">' + (state.currentHole + 1) + ' / ' + state.numHoles + '</div></div>' +
      '</div>' +
      '<div style="text-align:right;"><div class="hb-label">Par</div><div class="hb-value">' + state.pars[state.currentHole] + '</div></div>' +
      '</div>' +
      '<div class="timer-row">' +
      '<div class="timer-box"><div class="tb-label">Ce trou</div><div class="tb-value" id="holeTimerDisplay">00:00</div></div>' +
      '<div class="timer-box"><div class="tb-label">Cumul\u00e9</div><div class="tb-value" id="cumulTimerDisplay">' + formatTime(cumulativeSeconds()) + '</div></div>' +
      '</div>' +
      '</div>' +
      playersHtml +
      '<div class="card" style="margin-top:8px;"><h2>\u{1F3C6} Classement</h2>' + rankHtml + '</div>' +
      '<button class="link-btn" data-action="show-table-view" style="margin-bottom:12px;">\u{1F4CB} Voir la carte de score compl\u00e8te</button>' +
      '<button class="btn-primary" data-action="' + (isLast ? "finish-round" : "next-hole") + '">' + (isLast ? "Terminer la partie" : "Trou suivant") + ' \u203A</button>';
  }

  function renderSummary() {
    var b = computeBreakdown();
    var ranked = rankedPlayers(b.players);
    var isSolo = state.players.length === 1;
    var table = scoreTableHtml(false);

    var rankHtml = ranked.map(function (r, i) {
      return '<div class="row between" style="margin-bottom:8px;">' +
        '<span class="row"><span class="rank-num ' + (i === 0 ? "first" : "") + '">' + (i + 1) + '</span>' +
        '<span class="rank-name">' + escapeHtml(r.name) + '</span></span>' +
        '<span class="rank-score">' + r.totalScore + ' coups (' + diffLabel(r.totalDiff) + ')</span></div>';
    }).join("");

    return '' +
      '<div class="row gap2"><span style="font-size:24px;">\u{1F3C6}</span><h1>Partie termin\u00e9e</h1></div>' +
      '<p class="sub" style="margin-bottom:4px;">' + escapeHtml(state.courseName || "") + '</p>' +
      '<p class="sub" style="margin-bottom:4px;">' +
      (isSolo ? "Bravo. \u2014 Belle partie d'entra\u00eenement !" :
        "Bravo \u00e0 tous \u2014 " + escapeHtml(ranked[0].name) + " l'emporte avec " + ranked[0].totalScore + " coups !") +
      '</p>' +
      (state.savedNotice ? '<p class="saved-notice">\u2713 Partie enregistr\u00e9e dans l\'historique</p>' : '<div style="margin-bottom:20px;"></div>') +
      '<div class="card"><h2>Classement final</h2>' + rankHtml + '</div>' +
      '<div class="card">' + table + '</div>' +
      '<div class="total-time-row"><span>\u23F1 Temps total de jeu</span><span style="font-family:monospace;font-weight:700;">' + formatTime(state.elapsed) + '</span></div>' +
      '<button class="btn-outline" data-action="share-results">' + (state.copied ? "\u2713 Copi\u00e9 dans le presse-papiers !" : "\u{1F4E4} Partager les r\u00e9sultats") + '</button>' +
      '<button class="btn-primary" data-action="new-game">\u21BA Nouvelle partie</button>';
  }

  function renderHistory() {
    var itemsHtml;
    if (state.history.length === 0) {
      itemsHtml = '<div class="empty-state">Aucune partie enregistr\u00e9e pour l\'instant.</div>';
    } else {
      itemsHtml = state.history.map(function (item) {
        var hasRetour = item.numHoles > HALF;
        var holeTimesArr = item.holeTimes || [];
        var allerTime = sumRange(holeTimesArr, 0, Math.min(HALF, item.numHoles));
        var retourTime = hasRetour ? sumRange(holeTimesArr, HALF, item.numHoles) : 0;
        var sortedTotals = item.playerTotals.slice().sort(function (a, b) { return a.totalScore - b.totalScore; });
        var playersHtml = sortedTotals.map(function (t, i) {
          var detail = hasRetour ?
            'Aller ' + t.allerScore + ' (' + diffLabel(t.allerDiff) + ') \u00b7 Retour ' + t.retourScore + ' (' + diffLabel(t.retourDiff) + ')' : '';
          return '<div class="hist-player-row" style="align-items:flex-start;">' +
            '<span class="hp-name">' + (i + 1) + '. ' + escapeHtml(t.name) + (detail ? '<div style="font-size:11px;color:var(--stone-400);font-weight:400;">' + detail + '</div>' : '') + '</span>' +
            '<span class="hp-score">' + t.totalScore + ' coups <span class="hp-diff">(' + diffLabel(t.totalDiff) + ')</span></span>' +
            '</div>';
        }).join("");
        var totalTime = item.totalTime != null ? formatTime(item.totalTime) : "\u2013";
        var timeDetail = hasRetour ? (' (\u26F3 ' + formatTime(allerTime) + ' / ' + formatTime(retourTime) + ')') : '';
        return '<div class="history-item">' +
          '<div class="hist-top"><div>' +
          '<div class="course-name">' + escapeHtml(item.courseName || "Parcours") + '</div>' +
          '<div class="date">' + formatDate(item.date) + ' \u00b7 ' + item.numHoles + ' trous \u00b7 \u23F1 ' + totalTime + timeDetail + '</div>' +
          '</div>' +
          '<div class="row gap2">' +
          '<button class="icon-btn" data-action="share-history" data-id="' + item.id + '" aria-label="Partager">\u{1F4E4}</button>' +
          '<button class="icon-btn" data-action="delete-history" data-id="' + item.id + '" aria-label="Supprimer">\u{1F5D1}</button>' +
          '</div>' +
          '</div>' +
          '<div class="hist-players">' + playersHtml + '</div>' +
          '</div>';
      }).join("");
    }
    return '<div class="row gap2" style="margin-bottom:20px;">' +
      '<button class="icon-btn" data-action="back-config" aria-label="Retour">\u2039</button>' +
      '<h1 style="font-size:18px;">Historique des parties</h1></div>' +
      itemsHtml;
  }

  // ---------- event delegation ----------
  var app = document.getElementById("app");
  app.addEventListener("click", function (e) {
    var t = e.target.closest("[data-action]");
    if (!t || t.disabled) return;
    var action = t.dataset.action;
    if (action === "select-course") selectCourse(t.dataset.id);
    else if (action === "delete-course") deleteCourse(t.dataset.id);
    else if (action === "new-course-draft") newCourseDraft();
    else if (action === "set-holes") setHoleCount(Number(t.dataset.holes));
    else if (action === "update-par") updatePar(Number(t.dataset.index), Number(t.dataset.delta));
    else if (action === "save-course") saveCurrentCourse();
    else if (action === "add-player") addPlayer();
    else if (action === "remove-player") removePlayer(Number(t.dataset.index));
    else if (action === "go-to-play") goToPlayScreen();
    else if (action === "go-config") { state.screen = "config"; render(); }
    else if (action === "go-play") { if (state.roundInitialized) { state.screen = state.finishedRound ? "summary" : "play"; render(); } }
    else if (action === "back-config") { state.screen = "config"; render(); }
    else if (action === "open-history") openHistory();
    else if (action === "delete-history") deleteHistoryItem(t.dataset.id);
    else if (action === "share-history") shareHistoryItem(t.dataset.id);
    else if (action === "edit-score") editScore(Number(t.dataset.player), Number(t.dataset.hole));
    else if (action === "adjust-score") adjustScore(Number(t.dataset.player), Number(t.dataset.delta));
    else if (action === "prev-hole") goToHole(state.currentHole - 1);
    else if (action === "next-hole") goToHole(state.currentHole + 1);
    else if (action === "show-hole-view") { state.playSubview = "hole"; render(); }
    else if (action === "show-table-view") { state.playSubview = "table"; render(); }
    else if (action === "start-chrono") startChrono();
    else if (action === "finish-round") finishRound();
    else if (action === "share-results") shareResults();
    else if (action === "new-game") newGame();
  });
  app.addEventListener("input", function (e) {
    if (e.target.matches(".player-input")) {
      state.players[Number(e.target.dataset.playerIndex)] = e.target.value;
    } else if (e.target.matches(".course-name-input")) {
      state.courseName = e.target.value;
    }
  });

  render();
})();
</script>
</body>
</html>
