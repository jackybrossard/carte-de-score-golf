<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Score Golf">
<title>Carte de score - Golf</title>
<style>
  :root {
    --emerald-900:#064e3b; --emerald-800:#065f46; --emerald-700:#047857; --emerald-50:#ecfdf5;
    --amber-400:#fbbf24; --amber-100:#fef3c7; --amber-800:#92400e; --amber-900:#78350f;
    --rose-100:#ffe4e6; --rose-200:#fecdd3; --rose-700:#be123c; --rose-900:#881337; --rose-600:#e11d48;
    --stone-50:#fafaf9; --stone-100:#f5f5f4; --stone-200:#e7e5e4; --stone-300:#d6d3d1;
    --stone-400:#a8a29e; --stone-500:#78716c; --stone-600:#57534e; --stone-700:#44403c;
    --stone-800:#292524; --stone-900:#1c1917;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--stone-100);
    color: var(--stone-800);
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; min-height: 100vh; }
  .row { display: flex; align-items: center; }
  .between { justify-content: space-between; }
  .gap2 { gap: 8px; }
  .gap3 { gap: 12px; }
  h1 { font-size: 22px; font-weight: 800; color: var(--emerald-900); margin: 0; letter-spacing: -0.01em; }
  h2 { font-size: 14px; font-weight: 700; color: var(--stone-700); margin: 0 0 12px; }
  p.sub { color: var(--stone-500); font-size: 13px; margin: 4px 0 24px; }
  .card { background: #fff; border: 1px solid var(--stone-200); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  input[type=text] {
    flex: 1; border: 1px solid var(--stone-300); border-radius: 10px; padding: 10px 12px;
    font-size: 15px; color: var(--stone-800); background: #fff;
  }
  input[type=text]:focus { outline: none; border-color: var(--emerald-700); box-shadow: 0 0 0 2px rgba(4,120,87,0.15); }
  .player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .icon-btn {
    width: 36px; height: 36px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; background: var(--stone-100); border: none; color: var(--stone-500); font-size: 16px; cursor: pointer;
  }
  .icon-btn:active { background: var(--rose-100); color: var(--rose-600); }
  .link-btn { background: none; border: none; color: var(--emerald-700); font-size: 14px; font-weight: 600; padding: 8px 0; cursor: pointer; }
  .holes-toggle { display: flex; gap: 8px; }
  .toggle-btn {
    flex: 1; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer;
    border: 1px solid var(--stone-300); background: #fff; color: var(--stone-600);
  }
  .toggle-btn.active { background: var(--emerald-800); border-color: var(--emerald-800); color: #fff; }
  .par-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .par-cell { background: var(--stone-50); border: 1px solid var(--stone-200); border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; }
  .par-cell .lbl { font-size: 10px; color: var(--stone-400); margin-bottom: 2px; }
  .par-cell .val { font-size: 17px; font-weight: 800; color: var(--stone-800); }
  .mini-btn { width: 22px; height: 22px; border-radius: 6px; background: var(--stone-200); border: none; color: var(--stone-600); font-size: 12px; cursor: pointer; }
  .par-btns { display: flex; gap: 4px; margin-top: 4px; }
  .btn-primary {
    width: 100%; background: var(--emerald-800); color: #fff; font-weight: 700; font-size: 15px;
    padding: 14px; border: none; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:active { background: var(--emerald-900); }
  .btn-outline {
    width: 100%; background: #fff; color: var(--emerald-800); font-weight: 700; font-size: 15px;
    padding: 14px; border: 1px solid var(--emerald-700); border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;
  }
  .header-bar { background: var(--emerald-900); color: #fff; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .hole-nav-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--emerald-800); border: none; color: #fff; font-size: 16px; cursor: pointer; }
  .hole-nav-btn:disabled { opacity: 0.3; }
  .hb-label { font-size: 11px; color: #a7f3d0; line-height: 1; margin-bottom: 3px; }
  .hb-value { font-size: 22px; font-weight: 800; line-height: 1; }
  .timer-box { display: flex; align-items: center; gap: 8px; background: rgba(6,95,70,0.5); border-radius: 10px; padding: 8px 12px; margin-top: 10px; }
  .timer-box .t { font-family: "SF Mono", Menlo, monospace; font-size: 18px; letter-spacing: 0.05em; }
  .timer-box .cap { font-size: 11px; color: #a7f3d0; margin-left: auto; }
  .player-score-card { background: #fff; border: 1px solid var(--stone-200); border-radius: 14px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .player-score-card .name { font-weight: 700; color: var(--stone-800); font-size: 15px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid; margin-top: 4px; }
  .badge-eagle { background: var(--amber-100); color: var(--amber-800); border-color: #fcd34d; }
  .badge-birdie { background: var(--emerald-50); color: var(--emerald-700); border-color: #6ee7b7; }
  .badge-par { background: var(--stone-100); color: var(--stone-600); border-color: var(--stone-300); }
  .badge-bogey { background: var(--rose-100); color: var(--rose-700); border-color: var(--rose-200); }
  .badge-double { background: var(--rose-200); color: var(--rose-900); border-color: #fda4af; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .step-btn { width: 36px; height: 36px; border-radius: 10px; border: none; font-size: 16px; cursor: pointer; }
  .step-minus { background: var(--stone-100); color: var(--stone-600); }
  .step-plus { background: var(--emerald-700); color: #fff; }
  .score-val { font-size: 22px; font-weight: 800; width: 28px; text-align: center; }
  .rank-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
  .rank-num { width: 20px; height: 20px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; background: var(--stone-100); color: var(--stone-500); }
  .rank-num.first { background: var(--amber-400); color: var(--amber-900); }
  .rank-name { font-weight: 600; color: var(--stone-800); margin-left: 8px; }
  .rank-score { color: var(--stone-600); font-weight: 600; }
  .rank-diff { color: var(--stone-400); font-weight: 400; }
  table.scorecard { width: 100%; font-size: 11px; border-collapse: collapse; }
  table.scorecard th { font-weight: 400; color: var(--stone-400); padding: 4px 2px; }
  table.scorecard td { padding: 4px 2px; text-align: center; }
  table.scorecard td.name-cell { text-align: left; font-weight: 600; color: var(--stone-700); white-space: nowrap; padding-right: 8px; }
  .score-chip { display: inline-block; width: 22px; height: 22px; line-height: 22px; border-radius: 6px; font-weight: 700; }
  .table-scroll { overflow-x: auto; }
  .total-time-row { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid var(--stone-200); border-radius: 14px; padding: 14px; margin-bottom: 24px; }
  .empty-state { background: #fff; border: 1px solid var(--stone-200); border-radius: 14px; padding: 24px; text-align: center; color: var(--stone-500); font-size: 13px; }
  .history-item { background: #fff; border: 1px solid var(--stone-200); border-radius: 12px; padding: 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .history-item .date { font-size: 11px; color: var(--stone-400); }
  .history-item .winner { font-size: 14px; font-weight: 700; color: var(--stone-800); margin-top: 2px; }
  .saved-notice { color: var(--emerald-700); font-size: 12px; margin: 4px 0 16px; }
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "golfScorecardHistory";
  var DEFAULT_PAR = 4, MIN_PAR = 3, MAX_PAR = 5, MAX_PLAYERS = 6;
  var timerInterval = null;

  function defaultState() {
    return {
      phase: "setup",
      players: ["", ""],
      numHoles: 9,
      pars: Array(9).fill(DEFAULT_PAR),
      currentHole: 0,
      scores: [],
      holeTimes: [],
      holeStart: null,
      elapsed: 0,
      copied: false,
      savedNotice: false,
      history: []
    };
  }
  var state = defaultState();

  function formatTime(totalSeconds) {
    var m = Math.floor(totalSeconds / 60), s = totalSeconds % 60;
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }
  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }
  function badgeClass(diff) {
    if (diff <= -2) return "badge-eagle";
    if (diff === -1) return "badge-birdie";
    if (diff === 0) return "badge-par";
    if (diff === 1) return "badge-bogey";
    return "badge-double";
  }
  function badgeLabel(diff) {
    return diff === 0 ? "par" : (diff > 0 ? "+" + diff : String(diff));
  }
  function formatDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) +
        " " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    } catch (e) { return iso; }
  }

  function totalsThroughCurrent() {
    return state.players.map(function (name, pIdx) {
      var strokes = 0, par = 0;
      for (var h = 0; h <= state.currentHole; h++) { strokes += state.scores[pIdx][h]; par += state.pars[h]; }
      return { name: name, strokes: strokes, diff: strokes - par };
    });
  }
  function computeFinalTotals() {
    return state.players.map(function (name, pIdx) {
      var strokes = state.scores[pIdx].reduce(function (a, b) { return a + b; }, 0);
      var par = state.pars.reduce(function (a, b) { return a + b; }, 0);
      return { name: name, strokes: strokes, diff: strokes - par };
    });
  }
  function ranked(list) {
    return list.slice().sort(function (a, b) { return a.strokes - b.strokes; });
  }

  // ---------- state mutators ----------
  function addPlayer() { if (state.players.length < MAX_PLAYERS) { state.players.push(""); render(); } }
  function removePlayer(i) { if (state.players.length > 1) { state.players.splice(i, 1); render(); } }
  function setHoleCount(n) {
    state.numHoles = n;
    var next = Array(n).fill(DEFAULT_PAR);
    for (var i = 0; i < Math.min(n, state.pars.length); i++) next[i] = state.pars[i];
    state.pars = next;
    render();
  }
  function updatePar(i, delta) {
    state.pars[i] = Math.min(MAX_PAR, Math.max(MIN_PAR, state.pars[i] + delta));
    render();
  }
  function startGame() {
    var finalPlayers = state.players.map(function (p, i) { return p.trim() || ("Joueur " + (i + 1)); });
    state.players = finalPlayers;
    state.scores = finalPlayers.map(function () { return state.pars.slice(); });
    state.holeTimes = Array(state.numHoles).fill(null);
    state.currentHole = 0;
    state.holeStart = Date.now();
    state.elapsed = 0;
    state.phase = "play";
    render();
  }
  function adjustScore(pIdx, delta) {
    state.scores[pIdx][state.currentHole] = Math.max(1, state.scores[pIdx][state.currentHole] + delta);
    render();
  }
  function goToHole(idx) {
    if (idx < 0 || idx >= state.numHoles) return;
    if (idx > state.currentHole) state.holeTimes[state.currentHole] = state.elapsed;
    state.currentHole = idx;
    state.holeStart = Date.now();
    state.elapsed = 0;
    render();
  }
  function finishRound() {
    state.holeTimes[state.currentHole] = state.elapsed;
    var totals = computeFinalTotals();
    var totalTime = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0);
    saveRoundToHistory(totals, totalTime);
    state.phase = "summary";
    render();
  }
  function newGame() { state = defaultState(); render(); }

  function saveRoundToHistory(totals, totalTime) {
    try {
      var round = {
        id: "round_" + Date.now(),
        date: new Date().toISOString(),
        numHoles: state.numHoles,
        players: state.players,
        pars: state.pars,
        scores: state.scores,
        holeTimes: state.holeTimes,
        totals: totals,
        totalTime: totalTime
      };
      var existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      existing.push(round);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
      state.savedNotice = true;
    } catch (e) {
      console.error("Erreur de sauvegarde :", e);
      state.savedNotice = false;
    }
  }
  function loadHistory() {
    try {
      var existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      existing.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
      state.history = existing;
    } catch (e) { state.history = []; }
  }
  function deleteHistoryItem(id) {
    try {
      var existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      var next = existing.filter(function (r) { return r.id !== id; });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      state.history = next;
      render();
    } catch (e) { console.error("Erreur de suppression :", e); }
  }
  function openHistory() { state.phase = "history"; loadHistory(); render(); }

  function buildShareText(finalRanked, totalTime) {
    var lines = ["\u26F3 R\u00e9sultats \u2014 " + state.numHoles + " trous"];
    finalRanked.forEach(function (r, i) {
      lines.push((i + 1) + ". " + r.name + " \u2014 " + r.strokes + " coups (" + (r.diff > 0 ? "+" + r.diff : r.diff) + ")");
    });
    lines.push("Temps total : " + formatTime(totalTime));
    return lines.join("\n");
  }
  function shareResults() {
    var finalRanked = ranked(computeFinalTotals());
    var totalTime = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0);
    var text = buildShareText(finalRanked, totalTime);
    if (navigator.share) {
      navigator.share({ title: "R\u00e9sultats de golf", text: text }).catch(function () {});
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () {
        state.copied = true; render();
        setTimeout(function () { state.copied = false; render(); }, 2500);
      }).catch(function () { window.prompt("Copie manuelle (Cmd/Ctrl+C) :", text); });
    } else {
      window.prompt("Copie manuelle (Cmd/Ctrl+C) :", text);
    }
  }

  // ---------- render ----------
  function render() {
    var app = document.getElementById("app");
    clearInterval(timerInterval);
    if (state.phase === "setup") app.innerHTML = renderSetup();
    else if (state.phase === "play") { app.innerHTML = renderPlay(); startTimer(); }
    else if (state.phase === "history") app.innerHTML = renderHistory();
    else app.innerHTML = renderSummary();
  }

  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(updateTimerDisplay, 1000);
  }
  function updateTimerDisplay() {
    var el = document.getElementById("timerDisplay");
    if (!el) return;
    state.elapsed = Math.floor((Date.now() - state.holeStart) / 1000);
    el.textContent = formatTime(state.elapsed);
  }

  function renderSetup() {
    var playersHtml = state.players.map(function (p, i) {
      return '<div class="player-row">' +
        '<input type="text" class="player-input" data-player-index="' + i + '" value="' + escapeHtml(p) + '" placeholder="Joueur ' + (i + 1) + '">' +
        (state.players.length > 1 ? '<button class="icon-btn" data-action="remove-player" data-index="' + i + '" aria-label="Retirer">\u2715</button>' : '') +
        '</div>';
    }).join("");

    var holesHtml = [9, 18].map(function (n) {
      return '<button class="toggle-btn ' + (state.numHoles === n ? "active" : "") + '" data-action="set-holes" data-holes="' + n + '">' + n + ' trous</button>';
    }).join("");

    var parsHtml = state.pars.map(function (par, i) {
      return '<div class="par-cell">' +
        '<span class="lbl">Trou ' + (i + 1) + '</span>' +
        '<span class="val">' + par + '</span>' +
        '<div class="par-btns">' +
        '<button class="mini-btn" data-action="update-par" data-index="' + i + '" data-delta="-1">\u2212</button>' +
        '<button class="mini-btn" data-action="update-par" data-index="' + i + '" data-delta="1">+</button>' +
        '</div></div>';
    }).join("");

    return '' +
      '<div class="row between" style="margin-bottom:2px;">' +
      '<div class="row gap2"><span style="font-size:24px;">\u26F3</span><h1>Carte de score</h1></div>' +
      '<button class="icon-btn" data-action="open-history" aria-label="Historique">\u{1F551}</button>' +
      '</div>' +
      '<p class="sub">Configure ta partie entre amis</p>' +
      '<div class="card"><h2>\u{1F465} Joueurs</h2>' + playersHtml +
      (state.players.length < MAX_PLAYERS ? '<button class="link-btn" data-action="add-player">+ Ajouter un joueur</button>' : '') +
      '</div>' +
      '<div class="card"><h2>Nombre de trous</h2><div class="holes-toggle">' + holesHtml + '</div></div>' +
      '<div class="card"><h2>Par de chaque trou</h2><div class="par-grid">' + parsHtml + '</div></div>' +
      '<button class="btn-primary" data-action="start-game">Lancer la partie \u203A</button>';
  }

  function renderHistory() {
    var itemsHtml;
    if (state.history.length === 0) {
      itemsHtml = '<div class="empty-state">Aucune partie enregistr\u00e9e pour l\'instant.</div>';
    } else {
      itemsHtml = state.history.map(function (item) {
        var winner = item.totals.slice().sort(function (a, b) { return a.strokes - b.strokes; })[0];
        return '<div class="history-item">' +
          '<div><div class="date">' + formatDate(item.date) + ' \u00b7 ' + item.numHoles + ' trous</div>' +
          '<div class="winner">' + (winner ? escapeHtml(winner.name) + " \u2014 " + winner.strokes + " coups" : "\u2014") + '</div></div>' +
          '<button class="icon-btn" data-action="delete-history" data-id="' + item.id + '" aria-label="Supprimer">\u{1F5D1}</button>' +
          '</div>';
      }).join("");
    }
    return '<div class="row gap2" style="margin-bottom:20px;">' +
      '<button class="icon-btn" data-action="back-setup" aria-label="Retour">\u2039</button>' +
      '<h1 style="font-size:18px;">Historique des parties</h1></div>' +
      itemsHtml;
  }

  function renderPlay() {
    var totals = totalsThroughCurrent();
    var rankedList = ranked(totals);
    var isLast = state.currentHole === state.numHoles - 1;

    var playersHtml = state.players.map(function (name, pIdx) {
      var val = state.scores[pIdx][state.currentHole];
      var diff = val - state.pars[state.currentHole];
      return '<div class="player-score-card">' +
        '<div><div class="name">' + escapeHtml(name) + '</div>' +
        '<div class="badge ' + badgeClass(diff) + '">' + badgeLabel(diff) + '</div></div>' +
        '<div class="stepper">' +
        '<button class="step-btn step-minus" data-action="adjust-score" data-player="' + pIdx + '" data-delta="-1">\u2212</button>' +
        '<span class="score-val">' + val + '</span>' +
        '<button class="step-btn step-plus" data-action="adjust-score" data-player="' + pIdx + '" data-delta="1">+</button>' +
        '</div></div>';
    }).join("");

    var rankHtml = rankedList.map(function (r, i) {
      return '<div class="rank-row">' +
        '<span class="row"><span class="rank-num ' + (i === 0 ? "first" : "") + '">' + (i + 1) + '</span>' +
        '<span class="rank-name">' + escapeHtml(r.name) + '</span></span>' +
        '<span class="rank-score">' + r.strokes + ' coups <span class="rank-diff">(' + (r.diff > 0 ? "+" + r.diff : r.diff) + ')</span></span>' +
        '</div>';
    }).join("");

    return '' +
      '<div class="header-bar">' +
      '<div class="row between">' +
      '<div class="row gap2">' +
      '<button class="hole-nav-btn" data-action="prev-hole" ' + (state.currentHole === 0 ? "disabled" : "") + '>\u2039</button>' +
      '<div><div class="hb-label">Trou</div><div class="hb-value">' + (state.currentHole + 1) + ' / ' + state.numHoles + '</div></div>' +
      '</div>' +
      '<div style="text-align:right;"><div class="hb-label">Par</div><div class="hb-value">' + state.pars[state.currentHole] + '</div></div>' +
      '</div>' +
      '<div class="timer-box">\u23F1 <span id="timerDisplay" class="t">00:00</span><span class="cap">temps sur ce trou</span></div>' +
      '</div>' +
      playersHtml +
      '<div class="card" style="margin-top:8px;"><h2>\u{1F3C6} Classement</h2>' + rankHtml + '</div>' +
      '<button class="btn-primary" data-action="' + (isLast ? "finish-round" : "next-hole") + '">' +
      (isLast ? "Terminer la partie" : "Trou suivant") + ' \u203A</button>';
  }

  function renderSummary() {
    var finalTotals = computeFinalTotals();
    var finalRanked = ranked(finalTotals);
    var totalTime = state.holeTimes.reduce(function (a, b) { return a + (b || 0); }, 0);
    var isSolo = state.players.length === 1;

    var rankHtml = finalRanked.map(function (r, i) {
      return '<div class="row between" style="margin-bottom:8px;">' +
        '<span class="row"><span class="rank-num ' + (i === 0 ? "first" : "") + '">' + (i + 1) + '</span>' +
        '<span class="rank-name">' + escapeHtml(r.name) + '</span></span>' +
        '<span class="rank-score">' + r.strokes + ' coups (' + (r.diff > 0 ? "+" + r.diff : r.diff) + ')</span></div>';
    }).join("");

    var headerRow = '<tr><th style="text-align:left;">Trou</th>' + state.pars.map(function (_, i) { return "<th>" + (i + 1) + "</th>"; }).join("") + "</tr>";
    var parRow = '<tr><th style="text-align:left;">Par</th>' + state.pars.map(function (p) { return "<th>" + p + "</th>"; }).join("") + "</tr>";
    var bodyRows = state.players.map(function (name, pIdx) {
      var cells = state.scores[pIdx].map(function (s, hIdx) {
        var diff = s - state.pars[hIdx];
        return '<td><span class="score-chip ' + badgeClass(diff) + '">' + s + '</span></td>';
      }).join("");
      return '<tr><td class="name-cell">' + escapeHtml(name) + '</td>' + cells + '</tr>';
    }).join("");
    var timeRow = '<tr><td style="color:var(--stone-400);">Temps</td>' + state.holeTimes.map(function (t) {
      return '<td style="color:var(--stone-400);">' + (t != null ? formatTime(t) : "\u2013") + '</td>';
    }).join("") + '</tr>';

    return '' +
      '<div class="row gap2"><span style="font-size:24px;">\u{1F3C6}</span><h1>Partie termin\u00e9e</h1></div>' +
      '<p class="sub" style="margin-bottom:4px;">' +
      (isSolo ? "Bravo. \u2014 Belle partie d'entra\u00eenement !" :
        "Bravo \u00e0 tous \u2014 " + escapeHtml(finalRanked[0].name) + " l'emporte avec " + finalRanked[0].strokes + " coups !") +
      '</p>' +
      (state.savedNotice ? '<p class="saved-notice">\u2713 Partie enregistr\u00e9e dans l\'historique</p>' : '<div style="margin-bottom:20px;"></div>') +
      '<div class="card"><h2>Classement final</h2>' + rankHtml + '</div>' +
      '<div class="card table-scroll"><h2>D\u00e9tail par trou</h2><table class="scorecard"><thead>' + headerRow + parRow + '</thead><tbody>' + bodyRows + timeRow + '</tbody></table></div>' +
      '<div class="total-time-row"><span>\u23F1 Temps total de jeu</span><span style="font-family:monospace;font-weight:700;">' + formatTime(totalTime) + '</span></div>' +
      '<button class="btn-outline" data-action="share-results">' + (state.copied ? "\u2713 Copi\u00e9 dans le presse-papiers !" : "\u{1F4E4} Partager les r\u00e9sultats") + '</button>' +
      '<button class="btn-primary" data-action="new-game">\u21BA Nouvelle partie</button>';
  }

  // ---------- event delegation ----------
  var app = document.getElementById("app");
  app.addEventListener("click", function (e) {
    var t = e.target.closest("[data-action]");
    if (!t) return;
    var action = t.dataset.action;
    if (action === "add-player") addPlayer();
    else if (action === "remove-player") removePlayer(Number(t.dataset.index));
    else if (action === "set-holes") setHoleCount(Number(t.dataset.holes));
    else if (action === "update-par") updatePar(Number(t.dataset.index), Number(t.dataset.delta));
    else if (action === "start-game") startGame();
    else if (action === "adjust-score") adjustScore(Number(t.dataset.player), Number(t.dataset.delta));
    else if (action === "prev-hole") goToHole(state.currentHole - 1);
    else if (action === "next-hole") goToHole(state.currentHole + 1);
    else if (action === "finish-round") finishRound();
    else if (action === "open-history") openHistory();
    else if (action === "back-setup") { state.phase = "setup"; render(); }
    else if (action === "delete-history") deleteHistoryItem(t.dataset.id);
    else if (action === "share-results") shareResults();
    else if (action === "new-game") newGame();
  });
  app.addEventListener("input", function (e) {
    if (e.target.matches(".player-input")) {
      state.players[Number(e.target.dataset.playerIndex)] = e.target.value;
    }
  });
 
  render();
})();
</script>
</body>
</html>
